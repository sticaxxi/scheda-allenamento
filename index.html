<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#0d1117">
<title>Scheda Allenamento</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0D1117; --bg2: #161B22; --bg3: #1C2333; --card: #1C2333;
  --border: #2D3748; --text: #E6EDF3; --text2: #8B949E;
  --accent: #58A6FF; --green: #3FB950; --orange: #F0883E;
  --red: #F85149; --purple: #BC8CFF; --yellow: #E3B341;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'Space Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Top Bar ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border); padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar h1 {
  font-size: 1.1rem; font-weight: 700; letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.week-badge {
  font-family: var(--mono); font-size: 0.7rem; color: var(--text2);
  background: var(--bg3); padding: 5px 12px; border-radius: 20px; letter-spacing: 0.05em;
}

/* ── Week Selector ── */
.week-row { display: flex; gap: 8px; padding: 14px 16px; overflow-x: auto; scrollbar-width: none; }
.week-row::-webkit-scrollbar { display: none; }
.wk-btn {
  all: unset; cursor: pointer; flex-shrink: 0;
  font-family: var(--font); font-size: 0.82rem; font-weight: 500;
  padding: 10px 20px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
  transition: all 0.25s; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.wk-btn span { font-family: var(--mono); font-size: 0.62rem; opacity: 0.6; }
.wk-btn.on {
  background: rgba(88,166,255,0.12); border-color: var(--accent); color: var(--accent);
}
.wk-btn.on span { opacity: 1; }

/* ── Progress ── */
.prog-wrap { padding: 2px 20px 8px; }
.prog-bar { height: 5px; background: var(--bg3); border-radius: 5px; overflow: hidden; }
.prog-fill {
  height: 100%; border-radius: 5px; transition: width 0.45s ease;
  background: linear-gradient(90deg, var(--accent), var(--green));
}
.prog-txt {
  font-family: var(--mono); font-size: 0.62rem; color: var(--text2);
  text-align: right; margin-top: 4px;
}

/* ── Day Tabs ── */
.day-row { display: flex; gap: 6px; padding: 0 16px 10px; }
.dy-btn {
  all: unset; cursor: pointer; flex: 1; text-align: center;
  font-family: var(--font); font-size: 0.82rem; font-weight: 600;
  padding: 12px 6px; border-radius: 10px;
  background: var(--bg2); color: var(--text2); position: relative; transition: all 0.2s;
}
.dy-btn.on { background: var(--accent); color: #fff; }
.dy-btn.bonus { border: 1.5px dashed var(--orange); }
.dy-btn.bonus.on { background: var(--orange); border-color: var(--orange); color: #fff; }
.dy-badge {
  position: absolute; top: -7px; right: -3px;
  font-family: var(--mono); font-size: 0.52rem; font-weight: 700;
  background: var(--green); color: #fff; padding: 1px 6px; border-radius: 8px; display: none;
}
.dy-badge.show { display: block; }

/* ── Quick Timers ── */
.qt-row { display: flex; gap: 8px; padding: 6px 16px 6px; }
.qt-btn {
  all: unset; cursor: pointer;
  font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
  padding: 8px 16px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
  transition: all 0.15s;
}
.qt-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(0.95); }

/* ── Section Headers ── */
.sec-hdr {
  display: flex; align-items: center; gap: 10px;
  margin: 22px 0 8px; padding-bottom: 8px;
}
.sec-hdr .ico { font-size: 1.15rem; }
.sec-hdr h2 { font-size: 0.92rem; font-weight: 700; letter-spacing: -0.01em; }
.sec-hdr.rehab { border-bottom: 2px solid var(--red); }
.sec-hdr.rehab h2 { color: var(--red); }
.sec-hdr.warm { border-bottom: 2px solid var(--orange); }
.sec-hdr.warm h2 { color: var(--orange); }
.sec-hdr.main { border-bottom: 2px solid var(--accent); }
.sec-hdr.main h2 { color: var(--accent); }
.sec-hdr.cool { border-bottom: 2px solid var(--green); }
.sec-hdr.cool h2 { color: var(--green); }
.sec-note { font-size: 0.76rem; color: var(--text2); font-style: italic; margin-bottom: 10px; padding-left: 4px; }

/* ── Day Title ── */
.day-title { font-size: 1.15rem; font-weight: 700; margin: 16px 0 4px; }

/* ── Exercise Cards ── */
.ex {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; cursor: pointer; transition: all 0.25s ease;
  animation: fadeUp 0.3s ease both;
}
.ex:active { transform: scale(0.985); }
.ex.done { opacity: 0.4; background: var(--bg); border-color: rgba(63,185,80,0.4); }
.ex.done .ex-name { text-decoration: line-through; }
.chk {
  width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; color: transparent; transition: all 0.2s;
}
.ex.done .chk { background: var(--green); border-color: var(--green); color: #fff; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.ex-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.ex-meta span {
  font-family: var(--mono); font-size: 0.68rem; padding: 2px 8px;
  border-radius: 6px; background: var(--bg);
}
.ex-meta .s { color: var(--accent); }
.ex-meta .r { color: var(--purple); }
.ex-notes { font-size: 0.74rem; color: var(--text2); margin-top: 5px; font-style: italic; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.ex:nth-child(2) { animation-delay: .02s } .ex:nth-child(3) { animation-delay: .04s }
.ex:nth-child(4) { animation-delay: .06s } .ex:nth-child(5) { animation-delay: .08s }
.ex:nth-child(6) { animation-delay: .10s } .ex:nth-child(7) { animation-delay: .12s }
.ex:nth-child(8) { animation-delay: .14s } .ex:nth-child(9) { animation-delay: .16s }

/* ── Reset ── */
.reset-row { display: flex; justify-content: center; padding: 24px; }
.reset-btn {
  all: unset; cursor: pointer;
  font-family: var(--font); font-size: 0.78rem; font-weight: 500;
  padding: 10px 28px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
}
.reset-btn:active { background: rgba(248,81,73,0.1); color: var(--red); border-color: var(--red); }

/* ── Timer Bar ── */
.timer-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(22,27,34,0.96); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding: 14px 20px; padding-bottom: max(14px, env(safe-area-inset-bottom));
  display: flex; align-items: center; gap: 14px;
  transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.timer-bar.vis { transform: translateY(0); }
.t-display {
  font-family: var(--mono); font-size: 2.2rem; font-weight: 700;
  min-width: 100px; text-align: center; letter-spacing: 0.04em; color: var(--accent);
}
.t-display.warn { color: var(--orange); }
.t-display.go { color: var(--green); }
.t-info { flex: 1; }
.t-info strong { display: block; font-size: 0.88rem; color: var(--text); }
.t-info span { font-size: 0.75rem; color: var(--text2); }
.t-btns { display: flex; gap: 8px; }
.t-btn {
  all: unset; cursor: pointer;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
  transition: all 0.15s;
}
.t-btn:active { transform: scale(0.88); }
.t-btn.pri { background: var(--accent); color: #fff; }
.t-btn.sec { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

/* ── Confetti ── */
.confetti { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 999; }
@keyframes cfall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(105vh) rotate(800deg) scale(0.2); opacity: 0; }
}

/* ── Content ── */
.content { padding: 0 14px 30px; }

/* ── Landscape optimization for iPad ── */
@media (min-width: 768px) {
  .content { max-width: 680px; margin: 0 auto; }
  .top-bar, .week-row, .day-row, .qt-row, .prog-wrap { max-width: 720px; margin-left: auto; margin-right: auto; }
}
</style>
</head>

    {n:"Burpee modificato",s:"3",r:"8",t:"Plank+push-up+in piedi"},
    {n:"Hollow body rock",s:"3",r:"30s",t:"Forma perfetta"},
    {n:"Back extension + Y raise",s:"3",r:"10",t:"Solleva + Y"},
    {n:"Trazioni miste",s:"4",r:"6-8",t:"Alterna presa"},
    {n:"Push-up declinato stretto",s:"3",r:"10",t:"Enfasi tricipiti"},
    {n:"Commando plank veloce",s:"3",r:"12/lato",t:"Ritmo sostenuto"},
    {n:"Flutter kicks",s:"3",r:"30/lato",t:"Core attivo"},
    {n:"Dead hang max",s:"2",r:"Max",t:"Decompressione e grip"},
  ]},
  "★":{ tt:"Bonus — Anti-rotazione", ex:[
    {n:"Pallof press camminata",s:"3",r:"10 passi/lato",t:"Lateralmente"},
    {n:"Plank to pike",s:"3",r:"10",t:"Fianchi in alto"},
    {n:"Good morning 5kg x2",s:"3",r:"12",t:"Un peso per mano"},
    {n:"Single arm row 5kg",s:"4",r:"12/lato",t:"Appoggiato a sedia"},
    {n:"Russian twist 5kg",s:"3",r:"15/lato",t:"Piedi sollevati"},
    {n:"Leg raise sbarra",s:"3",r:"10",t:"Gambe tese"},
    {n:"Wall sit",s:"2",r:"45s",t:"Schiena al muro, 90°"},
  ]},
}},
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let cW = "1-2", cD = "A";
let done = {};
try { const s = localStorage.getItem("wk_done"); if(s) done = JSON.parse(s); } catch(e){}
function save() { try { localStorage.setItem("wk_done", JSON.stringify(done)); } catch(e){} }
function key() { return cW+"_"+cD; }
function getDone(w,d) { return done[w+"_"+d] || []; }
function getTotal(w,d) { return WE.length + WG.length + W[w].days[d].ex.length + CD.length; }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
  // Weeks
  let wh = "";
  for (const k in W) {
    wh += `<button class="wk-btn ${k===cW?"on":""}" onclick="selW('${k}')">${W[k].l}<span>${W[k].d}</span></button>`;
  }
  document.getElementById("weekRow").innerHTML = wh;
  document.getElementById("wBadge").textContent = W[cW].l.toUpperCase();

  // Days
  let dh = "";
  for (const dk of ["A","B","C","★"]) {
    const bn = dk==="★";
    const on = dk===cD;
    const dn = getDone(cW,dk).length;
    const tt = getTotal(cW,dk);
    const badge = dn>0 ? `<span class="dy-badge show">${dn===tt?"✓":dn}</span>` : `<span class="dy-badge"></span>`;
    dh += `<button class="dy-btn ${on?"on":""} ${bn?"bonus":""}" onclick="selD('${dk}')">${bn?"★ Bonus":"Giorno "+dk}${badge}</button>`;
  }
  document.getElementById("dayRow").innerHTML = dh;

  // Progress
  const k = key();
  const doneArr = getDone(cW,cD);
  const total = getTotal(cW,cD);
  const pct = total>0 ? (doneArr.length/total*100) : 0;
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("progTxt").textContent = doneArr.length+" / "+total+" completati";

  // Content
  const day = W[cW].days[cD];
  let html = `<div class="day-title">${cD==="★"?"★ ":"Giorno "+cD+" — "}${day.tt}</div>`;
  let idx = 0;

  html += sec("rehab","🔴","Riabilitazione Gomito");
  html += `<div class="sec-note">Esegui prima di ogni allenamento. Se senti dolore, riduci il range.</div>`;
  WE.forEach(e => { html += card(e, idx, doneArr); idx++; });

  html += sec("warm","🟠","Mobilità Generale");
  WG.forEach(e => { html += card(e, idx, doneArr); idx++; });

  html += sec("main","🔵","Allenamento");
  day.ex.forEach(e => { html += card(e, idx, doneArr); idx++; });

  html += sec("cool","🟢","Defaticamento");
  CD.forEach(e => { html += card(e, idx, doneArr); idx++; });

  html += `<div class="reset-row"><button class="reset-btn" onclick="resetDay()">↺ Reset giornata</button></div>`;

  document.getElementById("content").innerHTML = html;

  if (doneArr.length === total && total > 0) celebrate();
}

function sec(cls, ico, title) {
  return `<div class="sec-hdr ${cls}"><span class="ico">${ico}</span><h2>${title}</h2></div>`;
}

function card(e, idx, doneArr) {
  const d = doneArr.includes(idx);
  return `<div class="ex ${d?"done":""}" onclick="tog(${idx})">
    <div class="chk">${d?"✓":""}</div>
    <div class="ex-info">
      <div class="ex-name">${e.n}</div>
      <div class="ex-meta"><span class="s">${e.s} serie</span><span class="r">${e.r}</span></div>
      ${e.t?`<div class="ex-notes">💡 ${e.t}</div>`:""}
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════
function selW(w) { cW=w; cD="A"; render(); window.scrollTo(0,0); }
function selD(d) { cD=d; render(); }
function tog(idx) {
  const k2 = key();
  if(!done[k2]) done[k2]=[];
  const i = done[k2].indexOf(idx);
  if(i>=0) done[k2].splice(i,1); else done[k2].push(idx);
  save(); render();
}
function resetDay() { done[key()]=[]; save(); render(); }

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
let tmInt=null, tmSec=0, tmOn=false;
function tmStart(s) {
  clearInterval(tmInt); tmSec=s; tmOn=true;
  document.getElementById("tmBar").classList.add("vis");
  document.getElementById("tmToggle").textContent="⏸";
  tmUpd();
  tmInt = setInterval(()=>{
    if(!tmOn) return;
    tmSec--;
    tmUpd();
    if(tmSec<=5&&tmSec>0) document.getElementById("tmDisp").className="t-display warn";
    if(tmSec<=0){
      clearInterval(tmInt); tmOn=false;
      document.getElementById("tmDisp").className="t-display go";
      document.getElementById("tmDisp").textContent="GO!";
      beep();
      setTimeout(()=>document.getElementById("tmBar").classList.remove("vis"),2500);
    }
  },1000);
}
function tmUpd(){
  const m=Math.floor(tmSec/60), s=tmSec%60;
  const d=document.getElementById("tmDisp");
  d.textContent=m+":"+String(s).padStart(2,"0");
  d.className="t-display";
}
function tmPause(){ tmOn=!tmOn; document.getElementById("tmToggle").textContent=tmOn?"⏸":"▶"; }
function tmStop(){ clearInterval(tmInt); tmOn=false; document.getElementById("tmBar").classList.remove("vis"); }

function beep(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.2,0.4].forEach(t=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.value=t<0.3?880:1100;o.type="sine";
      g.gain.setValueAtTime(0.25,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.15);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+0.15);
    });
  }catch(e){}
}

// ═══════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════
function celebrate(){
  const w=document.getElementById("confetti"); w.innerHTML="";
  const cols=["#58a6ff","#3fb950","#f0883e","#bc8cff","#e3b341","#f85149"];
  for(let i=0;i<40;i++){
    const d=document.createElement("div");
    const sz=6+Math.random()*10;
    d.style.cssText=`position:absolute;top:-12px;left:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;border-radius:${Math.random()>0.5?"50%":"2px"};
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation:cfall ${1.2+Math.random()*1.2}s ease-out ${Math.random()*0.4}s forwards;`;
    w.appendChild(d);
  }
  setTimeout(()=>w.innerHTML="",3500);
}

// Init
render();
</script>
